# .github/workflows/test.yml
name: CI and Wiki Publish

on:
  push:
    branches: [ main ]
    # PATHS FILTER REMOVED: Workflow will run on every push to main for maximum reliability.
  pull_request:
    # Only run CI jobs for pull requests, not wiki publish
    paths:
      - 'awsctl/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'tox.ini'
      - 'Makefile'
      - '.github/workflows/test.yml'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tox
        run: python -m pip install --upgrade pip tox

      - name: Run Linters via Tox
        run: tox -e lint

  test:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        python-version: [ "3.9", "3.11", "3.13" ]
        toxenv: [ "py39", "py311", "py313" ]
        include:
          - python-version: "3.9"
            toxenv: "py39"
          - python-version: "3.11"
            toxenv: "py311"
          - python-version: "3.13"
            toxenv: "py313"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Tox
        run: python -m pip install --upgrade pip tox

      - name: Run tests via Tox
        run: tox -e ${{ matrix.toxenv }}

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tox
        run: python -m pip install --upgrade pip tox

      - name: Run Build Validation via Tox
        run: tox -e build

  publish-wiki:
    name: Publish Wiki (Manual Git Push)
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write  # Required to push back to the repo/wiki

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Clone Wiki repo
        env:
          WIKI_PAT: ${{ secrets.WIKI_PAT }}
        run: |
          if [ -z "$WIKI_PAT" ]; then
            echo "WIKI_PAT is not set; cannot push to the wiki."
            exit 1
          fi
          git clone "https://x-access-token:${WIKI_PAT}@github.com/${{ github.repository }}.wiki.git" wiki-repo
          cd wiki-repo
          git checkout main || git checkout -b main

      - name: Stage and Push Wiki Content
        env:
          WIKI_PAT: ${{ secrets.WIKI_PAT }}
        run: |
          SOURCE_FILE="main-repo/wiki/Home.md"
          if [ ! -f "$SOURCE_FILE" ]; then
            echo "Error: Source wiki file ($SOURCE_FILE) not found. Check local file structure."
            exit 1
          fi

          cp "$SOURCE_FILE" wiki-repo/Home.md

          cd wiki-repo
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          git add Home.md
          if ! git diff-index --quiet HEAD; then
            echo "Changes detected. Committing and pushing."
            git commit -m "Automated Wiki Update: Sync from ${{ github.sha }} [skip ci]"
            git push "https://x-access-token:${WIKI_PAT}@github.com/${{ github.repository }}.wiki.git" main
          else
            echo "No changes detected. Push skipped."
          fi
