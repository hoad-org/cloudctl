# file: .github/workflows/security-audit.yaml
name: Scheduled Security Audit

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-dependencies:
    name: Audit Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev

      - name: Run audit
        run: |
          # Ensure pip-audit is installed and run it
          pip install pip-audit
          pip-audit --format json > audit-report.json || true
          echo "REPORT_PATH=audit-report.json" >> $GITHUB_ENV

      - name: Create Issue on Failure
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            // Defensive parsing to prevent TypeErrors if JSON is malformed/empty
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync(process.env.REPORT_PATH, 'utf8'));
            } catch (e) {
              console.log("Failed to parse audit report or no report generated.");
              // Exit gracefully if pip-audit failed completely
              return;
            }

            // [PATCH] Check if the property exists and is a non-empty array
            // This prevents TypeError: Cannot read properties of undefined (reading 'length')
            const vulns = report.vulnerabilities;

            if (Array.isArray(vulns) && vulns.length > 0) {
              const title = "🚨 Security: Dependency Vulnerabilities Detected";
              const body = `Found ${vulns.length} vulnerabilities. Please run pip-audit locally.`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security']
              });
            } else {
              console.log("No vulnerabilities found or report format unexpected.");
            }
