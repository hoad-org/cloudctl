# =============================================================================
# Python Tooling CI
# Purpose : Multi-version test matrix (3.12–3.14); Gitleaks secret scan gates
#           all subsequent jobs. Bandit and ruff run on primary version only.
# SP800-53: CA-2, CM-6, RA-5, SA-11, SI-3
# FedRAMP : Moderate / High baseline
# =============================================================================

name: Python Tooling CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

# Cancel in-progress runs on the same branch/PR to avoid wasted runner time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Fast-fail: never run tests alongside a potential secret leak ───────────
  scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          VERSION: "8.30.1"
          # SHA256 of gitleaks_8.30.1_linux_x64.tar.gz from official checksums.txt
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum --check
          tar -xz gitleaks < gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        # --no-git scans committed files only (not git history). Historical commits
        # contain a minisign PUBLIC key that gitleaks 8.18.4 flags as generic-api-key.
        # The current source file has a '# gitleaks:allow' comment suppressing it.
        run: gitleaks detect --source=. --config=.gitleaks.toml --no-git --redact --exit-code=1

  # ── Multi-version test matrix ──────────────────────────────────────────────
  test:
    name: "test (${{ matrix.python-version }})"
    needs: [scan]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install --with dev

      - name: Run tests
        run: poetry run pytest

      - name: Lint (ruff + black)
        if: matrix.python-version == '3.12'
        run: |
          poetry run ruff check .
          poetry run black --check .

      - name: Bandit security scan
        if: matrix.python-version == '3.12'
        run: poetry run bandit -r src/ -ll --exclude src/cloudctl/providers/

  # ── Dependency CVE audit ───────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (pip-audit)
    needs: [scan]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run pip-audit
        run: |
          pip install --upgrade pip pip-audit poetry
          pip-audit --strict -r <(poetry export --without-hashes -f requirements.txt)
