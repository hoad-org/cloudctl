# file: .github/workflows/ci.yaml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint & Format Check (Only on Linux/Latest to save time)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          black --check src tests
          ruff check src tests
          mypy src --strict
          bandit -r src -s B101,B404,B603,B607

      - name: Run Unit Tests
        run: pytest -v --cov=awsctl --cov-report=xml

      # --- Platform Specific Smoke Tests (ALL VERSIONS) ---

      - name: Smoke Test (Linux/Bash)
        if: runner.os == 'Linux'
        run: ./tools/comprehensive_smoke.sh

      - name: Smoke Test (macOS/Zsh)
        if: runner.os == 'macOS'
        run: |
          export TEST_SHELL="/bin/zsh"
          ./tools/comprehensive_smoke.sh

      # [FIX] ENABLE WINDOWS SMOKE TESTS (via Git Bash)
      - name: Smoke Test (Windows/Bash)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export PYTHON_BIN="python"
          ./tools/comprehensive_smoke.sh

      # --- Upload Artifacts (CRITICAL FIX: Always upload) ---
      - name: Upload Smoke Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ runner.os }}-${{ matrix.python-version }}
          path: tools/smoke_artifacts
          retention-days: 7

  test-fish-shell:
    name: Test Shell Integration (Fish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies and Fish
        run: |
          sudo apt-get update && sudo apt-get install fish
          python -m venv venv && source venv/bin/activate
          pip install -e .[dev]

      - name: Run Smoke Test in Fish
        run: |
          export TEST_SHELL="/usr/bin/fish"
          ./tools/comprehensive_smoke.sh
        shell: bash
