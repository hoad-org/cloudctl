name: "Python Tooling CI"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Secret scan using Gitleaks (inline — same logic as shared reusable workflow)
  scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          VERSION="8.18.4"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        # --no-git scans committed files only (not git history). Historical commits
        # contain a minisign PUBLIC key that gitleaks 8.18.4 flags as generic-api-key.
        # The current source file has a '# gitleaks:allow' comment suppressing it.
        run: gitleaks detect --source=. --config=.gitleaks.toml --no-git --redact --exit-code=1

  # Python tests — matrix across all supported Python versions
  test:
    name: "test (${{ matrix.python-version }})"
    needs: [scan]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install --with dev

      - name: Run tests
        run: poetry run pytest

      - name: Lint (ruff + black)
        if: matrix.python-version == '3.12'
        run: |
          poetry run ruff check .
          poetry run black --check .

      - name: Bandit security scan
        if: matrix.python-version == '3.12'
        run: poetry run bandit -r src/ -ll --exclude src/awsctl/providers/

  # Dependency CVE audit
  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run pip-audit
        run: |
          pip install --upgrade pip pip-audit
          pip-audit --strict -r <(pip install poetry -q && poetry export --without-hashes -f requirements.txt 2>/dev/null) || true
