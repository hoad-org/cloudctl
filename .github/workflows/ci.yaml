# file: .github/workflows/ci.yaml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint & Format Check (Only on Linux/Latest to save time)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          black --check src tests
          ruff check src tests
          mypy src --strict
          bandit -r src -s B101,B404,B603,B607

      - name: Run Unit Tests
        run: pytest -v --cov=awsctl --cov-report=xml

      # --- REINSTATED SMOKE TESTS (SAFE & GENERIC) ---

      - name: Smoke Test (Linux/Bash)
        if: runner.os == 'Linux'
        run: ./tools/comprehensive_smoke.sh
        env:
          TEST_SHELL: /bin/bash

      - name: Smoke Test (Linux/Fish)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y fish
          ./tools/comprehensive_smoke.sh
        env:
          TEST_SHELL: /usr/bin/fish

      - name: Smoke Test (Mac/Zsh)
        if: runner.os == 'macOS'
        run: ./tools/comprehensive_smoke.sh
        env:
          TEST_SHELL: /bin/zsh

      - name: Smoke Test (Windows/GitBash)
        if: runner.os == 'Windows'
        shell: bash
        run: ./tools/comprehensive_smoke.sh
