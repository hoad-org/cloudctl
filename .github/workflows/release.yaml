# =============================================================================
# Release — Build and publish cloudctl wheel to GitHub Releases
# Purpose : On tag push, build wheel + sdist, verify with twine, create a
#           GitHub Release with the dist/ assets attached for install.sh /
#           install.ps1 / cloudctl upgrade to consume.
# SP800-53: CM-2, CM-3, SA-12
# FedRAMP : Moderate / High baseline
# =============================================================================

name: Release - Private Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

# Do not cancel in-progress releases — let a running release finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create GitHub Release

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Create GitHub Release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Force-cleanup existing release if it exists (e.g. from a re-tag)
          gh release delete "${{ github.ref_name }}" --yes || true

          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            --title "Release ${{ github.ref_name }}" \
            dist/*

      # Note: GitHub Packages does not support a PyPI registry.
      # Wheels are distributed via GitHub Release assets and installed using the
      # GitHub Releases API + direct download (see install.sh, install.ps1, cloudctl upgrade).
