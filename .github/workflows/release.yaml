# file: .github/workflows/release.yaml
# SECURE RELEASE WORKFLOW
# -----------------------
# Triggers on tags (e.g. v1.2.0).
# Builds and attaches artifacts to GitHub Releases.
# NO PyPI publish.
name: Release - Private Build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  secure-release:
    name: Build and Attach Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # [FIX] Force-cleanup existing release if it exists (e.g. from a force-push)
          # We use '|| true' to ignore errors if the release doesn't exist yet.
          gh release delete "${{ github.ref_name }}" --yes || true

          # Create fresh release
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            --title "Release ${{ github.ref_name }}" \
            dist/*
