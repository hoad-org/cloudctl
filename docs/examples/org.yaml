# awsctl Configuration Examples (~/.awsctl/orgs.yaml)
# ===================================================
# Choose ONE of the configurations below (remove the others).
# Multiple documents (---) cause validation errors.

# ===== 1. MINIMAL (Just the Basics) =====
# Uncomment this block for basic setup (default org only)
#enabled_orgs:
#  - myorg

# ===== 2. POWER USER (Aliases & Shortcuts) ⭐ MOST POPULAR =====
# Uncomment this block for quick aliases (awsctl switch @prod)
enabled_orgs:
  - myorg
  - engineering

# Aliases allow: awsctl switch @prod, awsctl switch @sandbox
aliases:
  prod:
    org: bt-avm                    # Production organization
    account: "338630860507"       # Production AWS account ID
    role: SecurityAuditor          # Read-only role for safety
    region: us-east-1             # Primary EU region

  sandbox:
    org: engineering              # Engineering organization
    account: "112233445566"       # Sandbox/development account
    role: AdministratorAccess     # Full admin for dev (use carefully!)
    region: us-east-1             # US primary region

# No plugins enabled (keeps it lightweight)
plugins:
  enabled: []

# ===== 3. ZERO TRUST ENTERPRISE (Remote Registry) =====
# Uncomment ONLY if using Tier 3 GitOps security model
#registry:
