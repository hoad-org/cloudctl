# file: mypy.ini
[mypy]
python_version = 3.9
ignore_missing_imports = true
strict_optional = true
explicit_package_bases = true

# Exclude build artifacts, venvs, and non-package code.
# This is the correct .ini syntax for a multi-line list.
exclude =
    build/
    dist/
    .venv/
    .tox/
    scripts/
    tests/
    tools/

# --- NEW: Specific packages to ignore during checks due to stubborn stub issues ---
[mypy-requests]
ignore_errors = True

[mypy-yaml]
ignore_errors = True
# ---------------------------------------------------------------------------------