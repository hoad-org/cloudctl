# file: .pre-commit-config.yaml
repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

# Local hooks — fully venv aware
  - repo: local
    hooks:
      - id: typecheck
        name: Mypy (Strict)
        entry: .venv/bin/mypy src
        language: system
        pass_filenames: false

      - id: security-scan
        name: Security Scan (Bandit + Pip-audit)
        entry: bash -c ".venv/bin/pip-audit && .venv/bin/bandit -r src -s B101,B404,B603,B607"
        language: system
        pass_filenames: false

      - id: test
        name: Unit Tests
        entry: .venv/bin/pytest --maxfail=1
        language: system
        pass_filenames: false

      # [FIX] Run cleanup last to ensure no artifacts are accidentally staged/leftover
      - id: cleanup
        name: Cleanup Artifacts
        entry: make clean
        language: system
        pass_filenames: false
        always_run: true

default_language_version:
  python: python3
