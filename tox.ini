# file: tox.ini
[tox]
envlist = py39, py310, py311, py312, py313, lint
isolated_build = True
skip_missing_interpreters = True

[testenv]
description = Run pytest for awsctl CLI
deps =
    pytest>=8.0
    pytest-mock
    colorama
    PyYAML
    InquirerPy
commands =
    pytest -v --disable-warnings --maxfail=1
setenv =
    AWSCTL_TEST_MODE = 1 
passenv =
    HOME
    USER
    SHELL
    PATH

# ------------------------------------------------------------
# Linting environment for code quality
# ------------------------------------------------------------
[testenv:lint]
description = Run static analysis (ruff + mypy + black --check)
skip_install = True
# Explicitly add the project root to MYPYPATH so mypy can find the source package
setenv =
    MYPYPATH = {toxinidir}
deps =
    ruff
    mypy
    black
    types-PyYAML  # Add stubs for PyYAML
    types-requests # Add stubs for requests
    # tomli is only needed for Python < 3.11
    tomli; python_version < "3.11"
commands =
    # [FIX] Changed 'awsctl' to 'src' to match project layout
    black --check src tests
    ruff check src tests
    # Run mypy on the source directory.
    mypy src

# ------------------------------------------------------------
# Optional: Code coverage (run manually)
# ------------------------------------------------------------
[testenv:coverage]
# Run tests with coverage reporting
description = Run tests with coverage reporting
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=awsctl --cov-report=term-missing

# ------------------------------------------------------------
# Build validation
# ------------------------------------------------------------
[testenv:build]
description = Validate build + install process
deps =
    build
    twine
commands =
    python -m build
    twine check dist/*